<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <style>
      .text-navy { fill: #000080; font-family: sans-serif; font-weight: bold; }
      .frame-gold { fill: none; stroke: #FFD700; stroke-width: 6; stroke-miterlimit: 10; }
      .fill-gold { fill: #FFD700; }
      .text-tagline { fill: #4b5563; font-family: sans-serif; font-size: 14px; font-weight: normal; }
    </style>
  </defs>
  
  <!-- Yellow Frame with gap -->
  <polyline class="frame-gold" points="230 25 250 25 250 95 50 95 50 25 200 25"/>
  
  <!-- "eepl" Text - Navy Blue -->
  <text class="text-navy" transform="translate(75 80)" font-size="72">eepl</text>
  
  <!-- "engineering pvt ltd" Text - Dark Gray -->
  <text class="text-tagline" transform="translate(75 112)">engineering pvt ltd</text>
  
  <!-- "ecologic" Text - Rotated, Dark Gray -->
  <text class="text-tagline" transform="translate(35 90) rotate(-90)">ecologic</text>
  
  <!-- Decorative Gold Squares -->
  <rect class="fill-gold" x="208" y="20" width="8" height="8"/>
  <rect class="fill-gold" x="220" y="20" width="8" height="8"/>
</svg>
